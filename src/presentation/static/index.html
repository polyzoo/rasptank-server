<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>RaspTank WebSocket demo</title>
    <link rel="stylesheet" href="/demo/styles.css"/>
</head>
<body>
<main>
    <section class="toolbar" aria-label="Управление маршрутом">
        <div>
            <p class="eyebrow">RaspTank</p>
            <h1>Маршрут и события</h1>
        </div>
        <div class="actions">
            <button id="startSquare" type="button">Квадрат 30 см</button>
            <button id="startLine" type="button">Вперед 100 см</button>
            <button id="resetView" type="button">Сбросить вид</button>
            <button id="stop" class="secondary" type="button">Стоп</button>
        </div>
    </section>

    <section class="workspace" aria-label="Карта движения">
        <div class="map-shell">
            <canvas id="routeCanvas" width="760" height="520"></canvas>
            <p class="map-hint">Тяни карту мышью или пальцем, чтобы сдвинуть поле.</p>
        </div>
        <aside class="panel">
            <p class="eyebrow">Состояние</p>
            <strong id="status">подключение...</strong>
            <div class="manual-controls" aria-label="Ручные команды">
                <label class="field">
                    <span>Шаг</span>
                    <input id="stepDistance" type="number" min="1" step="1" value="30"/>
                </label>
                <div class="manual-grid">
                    <button id="moveForward" type="button">Вперед</button>
                    <button id="moveLeft" type="button">Влево</button>
                    <button id="moveRight" type="button">Вправо</button>
                    <button id="moveBackward" type="button">Назад</button>
                </div>
            </div>
            <dl>
                <div>
                    <dt>X</dt>
                    <dd id="x">0 см</dd>
                </div>
                <div>
                    <dt>Y</dt>
                    <dd id="y">0 см</dd>
                </div>
                <div>
                    <dt>Курс</dt>
                    <dd id="heading">0°</dd>
                </div>
                <div>
                    <dt>Датчик</dt>
                    <dd id="obstacle">нет данных</dd>
                </div>
            </dl>
            <p id="message" class="message">Ожидание событий</p>
        </aside>
    </section>
</main>

<script src="/demo/app.js"></script>
</body>
</html>
